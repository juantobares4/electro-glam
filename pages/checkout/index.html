<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electro & Glam | FakeStore Online</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/images/logo/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/logo/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/images/logo/favicon/site.webmanifest" />
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Mis estilos -->
  <link rel="stylesheet" href="/css/main.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <main class="container p-5" id="purchaseSummary">
    <div class="row">
      <header class="col-12" id="purchaseSummaryHeader">
        <h3 class="fs-4 text-decoration-underline">Resumen de mi compra</h3>
      </header>

      <div class="col-12 mt-2" id="purchaseSummaryBody">
        <div class="row">
          <div id="summaryList" class="col-12 col-md-6 d-flex flex-column p-4 font-text text-black">
            <div class="d-flex flex-column gap-3" id="productsContainer"></div>
            <a href="/" class="btn btn-outline-dark order-last mt-5 border p-2 border-black rounded-0 font-title">Ver más productos...</a>
          </div>
          <div class="col-12 col-md-6 d-flex flex-column p-4 font-text gap-1 text-black border rounded h-50 border-1 border-black" >
            <div id="summaryTotalPrice"></div>
            <button id="finishPurchase" class="col-12 col-md-8 btn btn-outline-dark rounded-0 order-last" type="button">Finalizar compra</button> 
          </div>
        </div>
      </div>

      <div class="border-top border-1 border-black p-4 col-12 col-md-6 mt-5 mt-md-3" id="formPostalCode">
        <h4 class="fs-5 text-black">Calculá tu envío...</h4>
        <form id="calculateShipping" class="d-flex align-items-center font-text mt-3">
          <select id="selectedPostalCode" class="form-select rounded-0 border-1 border-dark me-1" aria-label="Default select">
            <option selected disabled value="">Seleccioná un código postal</option>
          </select>
        </form>
      </div>
    </div>
  </main>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script type="module" src="/js/checkout.js"></script>
</body>
</html>

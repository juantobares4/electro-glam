<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electro & Glam | FakeStore Online</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/images/logo/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/logo/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/images/logo/favicon/site.webmanifest" />
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Mis estilos -->
  <link rel="stylesheet" href="/css/main.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <nav class="navbar pb-4 pt-3">
    <div class="container-fluid d-flex justify-content-center justify-content-lg-between mx-4">
      <div class="d-flex justify-content-between align-items-center brand-container">
        <a href="/index.html">
          <img class="mb-3 mb-md-0 me-3 me-md-3" src="/images/logo/Electro&Glam.svg" alt="Electro & Glam Logo">
        </a>
      </div>
      <div class="nav-center d-flex align-items-center gap-3">
        <a href="/index.html">Ver todo</a>
        <div class="dropdown">
          <button class="btn dropdown-toggle text-black fw-500 p-0 border-0 bg-transparent"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false">
            Categorías
          </button>
          <ul class="dropdown-menu" id="categoriesContainer"></ul>
        </div>
        <a href="https://github.com/juantobares4" target="_blank" rel="noreferrer noopener">Nosotros</a>
      </div>
      <div class="d-flex align-items-center flex-inline gap-4 mt-2 mt-lg-0">
        <button 
          id="navCart"
          type="button"
          class="btn position-relative view-my-cart p-0 border-0 bg-transparent"
        >
          <i class="bi bi-bag fs-4 text-black"></i>
          <span 
            id="cart-counter"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill font-text"
          >
            <span class="visually-hidden">Productos en la cesta</span>
          </span>
        </button>
        <form id="searchProduct" class="d-flex align-items-center font-text" role="search">
          <input id="nameProduct" class="form-control me-1 rounded-0 border-1 border-dark" 
            type="search" placeholder="¿Qué buscas?" aria-label="Search">
          <button class="btn btn-dark rounded-0" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </form>
      </div>
    </div>
  </nav>
  <section class="container mt-5">
    <h4 class="text-black p-2" id="headerProductsList">Todos los productos</h4>
    <div class="row justify-content-center">
      <main id="products-list" class="row"></main>
    </div>
  </section>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
